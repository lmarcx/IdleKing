<!doctype html><html lang="fr"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>IdleKing — Combat HUD (Ère Funèbre)</title>
<link rel="stylesheet" href="_shared.css">
<style>
  .stage{position:relative;height:100vh;overflow:hidden;
    background:
      radial-gradient(circle at 50% 12%, rgba(255,138,43,.10), transparent 40%),
      radial-gradient(ellipse at 50% 120%, rgba(120,40,20,.35), transparent 60%),
      linear-gradient(180deg,#1a120c 0%,#0d0a08 60%,#070605 100%);
  }
  /* eclipsed sun */
  .sun{position:absolute;top:6%;left:50%;transform:translateX(-50%);width:140px;height:140px;border-radius:50%;
    background:radial-gradient(circle,#0a0a0a 52%,rgba(255,140,40,.55) 56%,transparent 70%);
    box-shadow:0 0 80px rgba(255,120,40,.25)}
  .ash{position:absolute;inset:0;background:
    radial-gradient(1px 1px at 20% 30%,rgba(255,200,150,.25),transparent),
    radial-gradient(1px 1px at 70% 60%,rgba(255,180,120,.20),transparent),
    radial-gradient(1px 1px at 40% 80%,rgba(255,200,150,.18),transparent);opacity:.7}
  /* boss bar */
  .bossbar{position:absolute;top:26px;left:50%;transform:translateX(-50%);width:min(560px,70vw);text-align:center}
  .bossbar .name{font-family:var(--font-title);letter-spacing:.12em;text-transform:uppercase;font-size:.9rem;color:#ffd9b0;text-shadow:0 0 12px rgba(255,120,40,.4)}
  .bossbar .track{height:14px;border-radius:8px;background:rgba(0,0,0,.6);border:1px solid rgba(255,120,40,.35);overflow:hidden;margin-top:6px}
  .bossbar .fill{height:100%;width:64%;background:linear-gradient(90deg,#b83232,#ff6a3a)}
  .bossbar .phase{font-size:.7rem;color:var(--ik-text-2);margin-top:4px;letter-spacing:.1em}
  /* actors */
  .enemy{position:absolute;left:62%;top:46%;width:120px;height:120px;border-radius:14px;
    background:radial-gradient(circle at 50% 35%,rgba(120,40,30,.9),rgba(20,8,6,.95));
    border:1px solid rgba(255,120,60,.3);display:grid;place-items:center;color:#ffb98a;font-size:.7rem}
  .player{position:absolute;left:34%;top:54%;width:84px;height:84px;border-radius:12px;
    background:radial-gradient(circle at 50% 30%,rgba(198,168,91,.9),rgba(40,30,10,.95));
    border:1px solid rgba(198,168,91,.6);display:grid;place-items:center;color:#1a1208;font-weight:700;font-size:.7rem}
  /* telegraphs */
  .tele{position:absolute;border-radius:50%;pointer-events:none}
  .tele--lethal{left:58%;top:42%;width:180px;height:180px;border:3px solid var(--tele-lethal);
    background:radial-gradient(circle,rgba(255,59,59,.18),transparent 70%);box-shadow:0 0 30px rgba(255,59,59,.3)}
  .tele--damage{left:40%;top:62%;width:120px;height:120px;border:3px dashed var(--tele-damage);
    background:radial-gradient(circle,rgba(255,138,43,.14),transparent 70%)}
  .dmg{position:absolute;font-family:var(--font-title);font-weight:700;text-shadow:0 2px 4px #000}
  .dmg.crit{color:#ffd23b;font-size:2rem;left:64%;top:38%}
  .dmg.norm{color:#fff;font-size:1.2rem;left:46%;top:50%}
  /* bottom HUD */
  .hud{position:absolute;left:0;right:0;bottom:0;padding:18px 26px;display:flex;align-items:flex-end;justify-content:space-between;gap:24px;
    background:linear-gradient(180deg,transparent,rgba(0,0,0,.55))}
  .vitals{display:grid;gap:8px;min-width:280px}
  .bar{display:grid;grid-template-columns:42px 1fr;align-items:center;gap:10px}
  .bar .lbl{font-size:.66rem;letter-spacing:.12em;color:var(--ik-text-2)}
  .bar .track{height:14px;border-radius:8px;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.08);overflow:hidden}
  .bar .fill{height:100%}
  .hp .fill{width:78%;background:linear-gradient(90deg,#7b1e1e,#e64a4a)}
  .mana .fill{width:55%;background:linear-gradient(90deg,#1c4f8a,#2da8ff)}
  .stam .fill{width:40%;background:linear-gradient(90deg,#2a7a3a,#1aff7a)}
  /* skill bar */
  .skills{display:flex;gap:12px;align-items:flex-end}
  .slot{position:relative;width:64px;height:64px;border-radius:12px;background:rgba(0,0,0,.5);
    border:1px solid rgba(255,255,255,.12);display:grid;place-items:center;font-size:1.6rem}
  .slot .key{position:absolute;top:-9px;left:-6px;font-size:.6rem;background:#000;border:1px solid rgba(255,255,255,.2);border-radius:6px;padding:1px 5px;color:var(--ik-text-1)}
  .slot .cd{position:absolute;inset:0;border-radius:12px;background:conic-gradient(rgba(0,0,0,.72) var(--cd),transparent 0)}
  .slot .mana{position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);font-size:.58rem;color:#2da8ff;background:rgba(0,0,0,.6);border-radius:6px;padding:0 5px}
  .slot.fire{box-shadow:0 0 14px rgba(255,90,40,.3);border-color:rgba(255,120,60,.5)}
  .slot.ice{box-shadow:0 0 14px rgba(0,200,255,.3);border-color:rgba(0,200,255,.5)}
  .slot.dark{box-shadow:0 0 14px rgba(138,92,255,.3);border-color:rgba(138,92,255,.5)}
  .slot.light{box-shadow:0 0 14px rgba(255,230,150,.3);border-color:rgba(255,230,150,.5)}
  .dash{display:grid;gap:6px;justify-items:center}
  .dash .pips{display:flex;gap:5px}
  .pip{width:14px;height:14px;border-radius:4px;border:1px solid rgba(26,255,122,.5);background:rgba(26,255,122,.25)}
  .pip.empty{background:transparent;opacity:.4}
  .dash .lbl{font-size:.6rem;letter-spacing:.14em;color:var(--ik-text-2)}
  .legend{position:absolute;top:18px;right:22px;font-size:.66rem;color:var(--ik-text-2);text-align:right;line-height:1.7}
  .legend b{color:var(--ik-text-1)}
  .sw{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:5px;vertical-align:middle}
  .caption{position:absolute;top:18px;left:22px;font-size:.7rem;color:var(--ik-text-2)}
  .caption b{color:var(--ik-gold);font-family:var(--font-title)}
</style></head>
<body>
<div class="stage">
  <div class="ash"></div><div class="sun"></div>
  <div class="caption"><b>COMBAT HUD</b> · Ère Funèbre · boss Prologue</div>
  <div class="legend">
    <div><span class="sw" style="background:var(--tele-lethal)"></span><b>Rouge</b> mortel</div>
    <div><span class="sw" style="background:var(--tele-damage)"></span><b>Orange</b> dégâts</div>
    <div><span class="sw" style="background:var(--tele-stun)"></span><b>Jaune</b> stun</div>
    <div><span class="sw" style="background:var(--tele-debuff)"></span><b>Bleu</b> debuff</div>
    <div><span class="sw" style="background:var(--tele-safe)"></span><b>Vert</b> safe</div>
  </div>

  <div class="bossbar">
    <div class="name">Amalgame des Ténèbres</div>
    <div class="track"><div class="fill"></div></div>
    <div class="phase">PHASE 1 / 1</div>
  </div>

  <div class="tele tele--lethal"></div>
  <div class="tele tele--damage"></div>
  <div class="enemy">AMALGAME</div>
  <div class="player">ROI</div>
  <div class="dmg crit">2 480!</div>
  <div class="dmg norm">312</div>

  <div class="hud">
    <div class="vitals">
      <div class="bar hp"><span class="lbl">HP</span><div class="track"><div class="fill"></div></div></div>
      <div class="bar mana"><span class="lbl">MANA</span><div class="track"><div class="fill"></div></div></div>
      <div class="bar stam"><span class="lbl">STAM</span><div class="track"><div class="fill"></div></div></div>
    </div>

    <div class="skills">
      <div class="slot fire">🔥<span class="key">1</span><span class="mana">20</span></div>
      <div class="slot ice">❄️<span class="key">2</span><div class="cd" style="--cd:40%"></div><span class="mana">35</span></div>
      <div class="slot dark">🌑<span class="key">3</span><span class="mana">25</span></div>
      <div class="slot light">✨<span class="key">4</span><span class="mana">50</span></div>
      <div class="slot">⚔️<span class="key">5</span><span class="mana">15</span></div>
    </div>

    <div class="dash">
      <div class="pips"><span class="pip"></span><span class="pip"></span><span class="pip empty"></span></div>
      <div class="lbl">DASH (Stamina)</div>
    </div>
  </div>
</div>
</body></html>
